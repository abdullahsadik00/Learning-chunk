name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Lint React project
        working-directory: basics/react
        run: npm install && npm run lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Test week-2-js
        working-directory: basics/week-2/Assignment/week-2-js
        run: npm install && npm test

      - name: Test week-2-async-js
        working-directory: basics/week-2/Assignment/week-2-async-js
        run: npm install && npm test

      - name: Test backend middlewares
        working-directory: backend/week-4/middlewares
        run: npm install && npm test

      - name: Test course-rating-app
        working-directory: frontend/course-rating-app
        run: npm install && npm test
